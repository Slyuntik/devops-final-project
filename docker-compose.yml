services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: scibert-app
    restart: unless-stopped
    environment:
      - MODEL_PATH=/app/data/scibert_quality_model
      - LOG_LEVEL=INFO
    volumes:
      - ./data/scibert_quality_model:/app/data/scibert_quality_model:ro
    ports:
      - "8000:8000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    container_name: scibert-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./static:/usr/share/nginx/html:ro
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    container_name: scibert-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scibert_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scibert_pass}
      POSTGRES_DB: ${POSTGRES_DB:-scibert_quality}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scibert_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: scibert-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    networks:
      - app-network
    depends_on:
      app:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.2.0
    container_name: scibert-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - app-network
    depends_on:
      - prometheus

networks:
  app-network:
    driver: bridge
    name: scibert-network

volumes:
  postgres_data:
    name: scibert-postgres-data
  prometheus_data:
    name: scibert-prometheus-data
  grafana_data:
    name: scibert-grafana-data
