groups:
  - name: scibert_alerts
    interval: 30s
    rules:
      - alert: HighPredictionLatency
        expr: histogram_quantile(0.95, sum(rate(prediction_duration_seconds_bucket[5m])) by (le)) > 1.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Высокая задержка предсказаний"
          description: "95-й перцентиль времени ответа модели превышает 1 секунду"
      
      - alert: HighErrorRate
        expr: rate(predict_requests_total{status="error"}[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Высокий процент ошибок API"
          description: "Более 10% запросов заканчиваются ошибкой"
      
      - alert: ServiceDown
        expr: up{job="scibert-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Сервис недоступен"
          description: "Метрики не поступают от scibert-api более минуты"
      
      - alert: ModelNotLoaded
        expr: model_loaded == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Модель SciBERT не загружена"
          description: "ML модель не загружена в память, проверьте контейнер"